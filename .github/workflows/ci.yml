name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: flowpilot-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            back/requirements.txt
            back/requirements-dev.txt
      - name: Install backend dependencies
        working-directory: back
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt
      - name: Run backend tests
        working-directory: back
        run: pytest

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: front/requirements.txt
      - name: Install frontend dependencies
        working-directory: front
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile frontend source
        working-directory: front
        run: python -m compileall -q .

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit backend dependencies
        run: python -m pip_audit -r back/requirements-dev.txt
      - name: Audit frontend dependencies
        run: python -m pip_audit -r front/requirements.txt

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-tests, frontend-checks, dependency-audit]
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build both images
        run: docker compose build
      - name: Start the integrated stack
        run: docker compose up --detach
      - name: Verify web-to-API round trip
        run: bash scripts/verify_deployment.sh
      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail 120
      - name: Stop the stack
        if: always()
        run: docker compose down --volumes --remove-orphans
